name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Run tests (incl. conformance parity)
        run: python tests/run.py
